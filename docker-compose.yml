services:
  orivis-api:
    build: .
    container_name: orivis-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
    environment:
      - DEVICE=cpu 
    restart: always

  orivis-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orivis-frontend
    ports:
      - "3000:80"
    depends_on:
      - orivis-api
    restart: always
